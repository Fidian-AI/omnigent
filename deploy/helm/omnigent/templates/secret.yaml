{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "omnigent.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "omnigent.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
type: Opaque
stringData:
  DATABASE_URL: {{ include "omnigent.databaseUrl" . | quote }}
  {{- if .Values.postgres.enabled }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  {{- end }}
  {{- if include "omnigent.accountsAuth" . }}
  OMNIGENT_ACCOUNTS_COOKIE_SECRET: {{ required "auth.accountsCookieSecret is required for accounts auth (openssl rand -hex 32), or set existingSecret" .Values.auth.accountsCookieSecret | quote }}
  {{- end }}
{{- end }}
