{{- if .Values.sandboxes.enabled }}
# RBAC for the kubernetes sandbox provider. Two-namespace, least-blast-radius
# design: the server runs as its own SA in the release namespace; its Pod +
# Secret rights are a namespaced Role in the runner namespace, granted via a
# cross-namespace RoleBinding — so a compromised server can manage runner Pods
# but cannot touch the server/DB Pods or read the server's Secrets, and (no
# pods/exec grant) cannot execute commands inside any Pod.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "omnigent.serverServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "omnigent.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
---
# The runner SA is intentionally powerless — bound to no Role. Runner Pods set
# automountServiceAccountToken: false regardless; this SA is a policy handle
# (NetworkPolicy, PodSecurity, quotas), not an access grant.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "omnigent.runnerServiceAccountName" . }}
  namespace: {{ .Values.sandboxes.namespace }}
  labels:
    {{- include "omnigent.labels" . | nindent 4 }}
    app.kubernetes.io/component: runner
automountServiceAccountToken: false
---
# Exactly what the entrypoint-as-host launcher calls, nothing more: create/
# get/delete runner Pods, read failed-start logs, create/delete the per-Pod
# launch-token Secrets, and list scheduler/kubelet events for diagnostics.
# Deliberately NO pods/exec and no watch.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "omnigent.fullname" . }}-sandbox-manager
  namespace: {{ .Values.sandboxes.namespace }}
  labels:
    {{- include "omnigent.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["list"]
---
# Cross-namespace binding: lives in the runner namespace, subject is the
# server SA in the release namespace — the grant can never reach beyond the
# runner namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "omnigent.fullname" . }}-sandbox-manager
  namespace: {{ .Values.sandboxes.namespace }}
  labels:
    {{- include "omnigent.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "omnigent.fullname" . }}-sandbox-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "omnigent.serverServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
