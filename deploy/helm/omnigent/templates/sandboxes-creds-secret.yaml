{{- if and .Values.sandboxes.enabled (not .Values.sandboxes.credentials.existingSecret) }}
# Harness LLM / git credentials projected into every runner Pod via envFrom.
# Rendered even when empty: the runner Pod's envFrom is non-optional, so the
# Secret must exist for Pods to start. Populate sandboxes.credentials.data
# from an untracked values file, or switch to credentials.existingSecret.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "omnigent.credsSecretName" . }}
  namespace: {{ .Values.sandboxes.namespace }}
  labels:
    {{- include "omnigent.labels" . | nindent 4 }}
    app.kubernetes.io/component: runner
type: Opaque
{{- with .Values.sandboxes.credentials.data }}
stringData:
  {{- range $key, $value := . }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
{{- end }}
